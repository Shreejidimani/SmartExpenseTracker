<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <header class="bg-primary text-white text-center py-5">
        <img src="{{ url_for('static', filename='images/home.jpg') }}" alt="Header Image" class="img-fluid" style="max-height: 400px; object-fit: cover;">
        <h1 class="display-4 mt-4">Welcome to Smart Expense Tracker</h1>
        <p class="lead">Track your expenses effectively.</p>
    </header>

    <section class="cta-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <div class="card shadow">
                        <div class="card-body">
                            <h2 class="card-title">Manage Your Finances Like a Pro</h2>
                            <p class="card-text">Track your expenses, set goals, and visualize your spending habits for smarter financial decisions.</p>
                            <div class="cta-buttons">
                                <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg mr-2"><i class="fas fa-sign-in-alt"></i> Login</a>
                                <a href="{{ url_for('register') }}" class="btn btn-success btn-lg"><i class="fas fa-user-plus"></i> Sign Up</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 Smart Expense Tracker | All Rights Reserved</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
